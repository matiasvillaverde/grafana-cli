run:
  timeout: 5m
  tests: true

linters:
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - gocritic
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unused

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

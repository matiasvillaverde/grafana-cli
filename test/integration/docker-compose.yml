services:
  grafana:
    image: grafana/grafana:11.6.13
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_RENDERING_IGNORE_HTTPS_ERRORS: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo
      - renderer

  renderer:
    image: grafana/grafana-image-renderer:v5.6.3
    ports:
      - "8081:8081"

  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - pushgateway

  pushgateway:
    image: prom/pushgateway:v1.11.2
    ports:
      - "9091:9091"

  loki:
    image: grafana/loki@sha256:3c8fd3570dd9219951a60d3f919c7f31923d10baee578b77bc26c4a0b32d092d
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo@sha256:3e0e1295a7643268a553d15299b75fc2e9320f4892bd600fc272d48279ca8907
    command:
      - -target=all
      - -config.file=/etc/tempo/tempo.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
      - "9411:9411"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro

partition_ring_live_store: true
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

query_frontend:
  rf1_after: "1999-01-01T00:00:00Z"
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1073741824
    metadata_slo:
      duration_slo: 5s
      throughput_bytes_slo: 1073741824
  trace_by_id:
    duration_slo: 5s

querier:
  query_live_store: true

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: grafana-cli
  storage:
    path: /var/tempo/generator/wal

backend_worker:
  ring:
    kvstore:
      store: memberlist

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - local-blocks

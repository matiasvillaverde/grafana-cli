name: Gemini Dispatch

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted
  issue_comment:
    types:
      - created

defaults:
  run:
    shell: bash

jobs:
  dispatch:
    if: |-
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.fork == false &&
        github.event.pull_request.draft == false
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.sender.type == 'User' &&
        startsWith(github.event.comment.body || '', '@gemini-cli /review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        github.event.sender.type == 'User' &&
        startsWith(github.event.comment.body || '', '@gemini-cli /review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review' &&
        github.event.sender.type == 'User' &&
        startsWith(github.event.review.body || '', '@gemini-cli /review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      additional_context: ${{ steps.extract_command.outputs.additional_context }}
      command: ${{ steps.extract_command.outputs.command }}
    steps:
      - name: Extract command
        id: extract_command
        uses: actions/github-script@v7
        env:
          EVENT_TYPE: ${{ github.event_name }}.${{ github.event.action }}
          REQUEST: ${{ github.event.comment.body || github.event.review.body || '' }}
        with:
          script: |
            const eventType = process.env.EVENT_TYPE;
            const request = process.env.REQUEST;

            if ([
              'pull_request.opened',
              'pull_request.reopened',
              'pull_request.synchronize',
              'pull_request.ready_for_review',
            ].includes(eventType)) {
              core.setOutput('command', 'review');
              return;
            }

            if (request.startsWith('@gemini-cli /review')) {
              core.setOutput('command', 'review');
              core.setOutput(
                'additional_context',
                request.replace(/^@gemini-cli \/review/, '').trim(),
              );
              return;
            }

            core.setOutput('command', 'fallthrough');

  review:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'review' }}
    uses: ./.github/workflows/gemini-review.yml
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    with:
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
    secrets: inherit

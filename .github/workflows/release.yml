name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

      - name: Test with coverage
        run: go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Enforce 100% coverage
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          echo "Total coverage: ${total}"
          if [ "${total}" != "100.0%" ]; then
            echo "Coverage gate failed: expected 100.0%, got ${total}"
            exit 1
          fi

      - name: Compute next semantic version
        id: version
        run: |
          set -euo pipefail

          if git describe --tags --exact-match >/dev/null 2>&1; then
            echo "create_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=head_already_tagged" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
            subject_log=$(git log --pretty=%s)
            body_log=$(git log --pretty=%B)
          else
            subject_log=$(git log --pretty=%s "$latest_tag..HEAD")
            body_log=$(git log --pretty=%B "$latest_tag..HEAD")
          fi

          bump="patch"
          if echo "$body_log" | grep -Eq 'BREAKING CHANGE'; then
            bump="major"
          elif echo "$subject_log" | grep -Eq '^[a-zA-Z0-9_-]+(\([^)]+\))?!:'; then
            bump="major"
          elif echo "$subject_log" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          fi

          version_core="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version_core"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="v${major}.${minor}.${patch}"

          echo "create_release=true" >> "$GITHUB_OUTPUT"
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        if: steps.version.outputs.create_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Build release artifacts
        if: steps.version.outputs.create_release == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${{ steps.version.outputs.version }}"

          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [ "${goos}" = "windows" ]; then
              ext=".exe"
            fi

            stage_dir="dist/${goos}_${goarch}"
            mkdir -p "${stage_dir}"
            bin="grafana${ext}"
            archive="grafana_${version}_${goos}_${goarch}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -o "${stage_dir}/${bin}" ./cmd/grafana

            if [ "${goos}" = "windows" ]; then
              (cd "${stage_dir}" && zip -9 "../${archive}.zip" "${bin}")
            else
              tar -C "${stage_dir}" -czf "dist/${archive}.tar.gz" "${bin}"
            fi

            rm -rf "${stage_dir}"
          done

          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Generate Homebrew formula
        if: steps.version.outputs.create_release == 'true'
        run: |
          set -euo pipefail
          go run ./cmd/release-assets homebrew \
            --repo "${{ github.repository }}" \
            --tag "${{ steps.version.outputs.version }}" \
            --checksums dist/checksums.txt > dist/grafana-cli.rb

      - name: Publish GitHub Release
        if: steps.version.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/grafana-cli.rb
